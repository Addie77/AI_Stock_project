<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockAI 智能儀表板</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
</head>
<body>
    <!-- 新增：小螢幕專用漢堡選單點擊按鈕 -->
    <button class="mobile-menu-toggle" id="menuToggleBtn">☰</button>
    <!-- 新增：小螢幕側邊欄開啟時的背景遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="container">
        <nav class="sidebar" id="sidebar">
            <div class="logo">StockAI</div>
            <ul class="nav-links">
                <li class="active" id="navMarketOverview">市場總覽</li>
                <li id="navWatchlist">自選股</li>
                <li id="navAiReport">AI 報告</li>
            </ul>
        </nav>

        <main class="main-content">
            <header>
                <input type="text" placeholder="搜尋股票代碼..." id="stockSearch">
                <div class="header-info">
                    <div id="displayName">載入中...</div>
                    <div class="status">系統：<span class="online">ONLINE</span></div>
                </div>
            </header>

            <div id="mainDashboardViews" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3 style="display: flex; align-items: center; justify-content: space-between;">
                            市場情感分數 
                            <span id="addWatchlistBtn" style="cursor: pointer; color: transparent; -webkit-text-stroke: 2px #ffffff; font-size: 1.6em; transition: transform 0.1s; user-select: none;" title="加入自選股">❤</span>
                        </h3>
                        <div class="sentiment-bar">
                            <div class="sentiment-fill" id="sentFill"></div>
                        </div>
                        <div id="sentVal" class="stat-value">0 / 100</div>
                        <p class="stat-desc">基於新聞與本地 FinBERT 語意分析</p>
                    </div>
                </div>

                <section class="chart-section">
                    <div class="chart-card">
                        <h3 id="chartTitle">過去 3 個月價格趨勢圖</h3>
                        <div class="canvas-wrapper">
                            <canvas id="stockChart"></canvas>
                        </div>
                    </div>
                </section>

                <section class="ai-report-section" id="aiReportSection">
                    <div class="news-card">
                        <div class="card-header-btn">
                            <h3>AI 智能建議報告</h3>
                            <button id="generateAiBtn" class="primary-btn">生成 AI 智能建議報告</button>
                        </div>
                        <div class="ai-content">
                            <p id="aiSummary">請點擊上方按鈕，以生成基於 3 個月歷史數據的 AI 技術面分析建議。</p>
                            <div id="aiAdvice" class="advice-box" style="display: none;"></div>
                        </div>
                    </div>
                </section>
            </div>

            <section class="watchlist-section" id="watchlistSection" style="display: none;">
                <div class="watchlist-card">
                    <h3>我的自選股清單</h3>
                    <p class="stat-desc">這裡可以展示您追蹤的股票自選清單項目</p>
                    <!-- 新增：表格包覆外框，防手機破版 -->
                    <div class="table-responsive" style="margin-top: 20px;">
                        暫無自選股資料，可在後續擴充此區塊功能。
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="script.js"></script>
    
    <!-- 新增：控制小螢幕漢堡選單開關的輕量 JS -->
    <script>
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const navLinks = document.querySelectorAll('.nav-links li');

        function toggleMenu() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('active');
        }

        menuToggleBtn.addEventListener('click', toggleMenu);
        sidebarOverlay.addEventListener('click', toggleMenu);
        
        // 點擊選單項目後自動關閉側邊欄
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    toggleMenu();
                }
            });
        });
    </script>
</body>
</html>
